name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Encode gateway URL
        run: echo "ENCODED_BASE_URL=$(echo -n '${{ secrets.RELEASE_BASE_URL }}' | base64 -w0)" >> $GITHUB_ENV
      - uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BASE_URL_ENCODED: ${{ env.ENCODED_BASE_URL }}
